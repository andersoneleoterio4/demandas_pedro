<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Demandas</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
      }

      th {
        background: #f0f0f0;
      }

      button {
        padding: 5px 10px;
        cursor: pointer;
      }

      #mensagem {
        margin-top: 12px;
        color: #555;
      }

      #mensagem.erro {
        color: #c0392b;
      }
    </style>
  </head>

  <body>
    <h2>Controle de Processos ANM</h2>

    <table id="tabela">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>CNPJ/CPF</th>
          <th>Processo ANM</th>
          <th>NUP</th>
          <th>Demanda</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>

    <p id="mensagem"></p>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbyhHEaUjqv7af2b6mH7pU5r1BhdKEo8waHzaBzQdBJGNAGWXslVooP0nQW8HKXrOTw/exec";

      const COLUNAS = [
        "cliente",
        "cnpjCpf",
        "processoAnm",
        "nup",
        "demanda",
        "status",
      ];

      function escaparHtml(valor) {
        if (valor === null || valor === undefined) return "";
        return String(valor)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function definirMensagem(texto, ehErro = false) {
        const mensagem = document.getElementById("mensagem");
        mensagem.textContent = texto;
        mensagem.classList.toggle("erro", ehErro);
      }

      async function carregarDados() {
        const tbody = document.querySelector("#tabela tbody");
        definirMensagem("Carregando dados...");

        try {
          const resposta = await fetch(API);

          if (!resposta.ok) {
            throw new Error(`Erro HTTP ${resposta.status}`);
          }

          const json = await resposta.json();

          // A API pode responder com um array puro ou um objeto
          // no formato { sucesso, dados, mensagem } / { erro }.
          if (json && json.sucesso === false) {
            throw new Error(json.mensagem || "A API retornou um erro.");
          }

          if (json && json.erro) {
            throw new Error(json.erro);
          }

          const dados = Array.isArray(json)
            ? json
            : Array.isArray(json && json.dados)
            ? json.dados
            : null;

          if (!dados) {
            throw new Error("Resposta da API em formato inesperado.");
          }

          const linhas = dados
            .map(
              (item) => `
                <tr>
                  ${COLUNAS.map(
                    (coluna) => `<td>${escaparHtml(item[coluna])}</td>`
                  ).join("")}
                </tr>`
            )
            .join("");

          tbody.innerHTML = linhas;
          definirMensagem(
            dados.length ? "" : "Nenhum registro encontrado."
          );
        } catch (erro) {
          tbody.innerHTML = "";

          const mensagemErro =
            erro instanceof TypeError
              ? "Não foi possível conectar à API. Verifique a conexão e se a implantação do Apps Script está com acesso para \"Qualquer pessoa\"."
              : `Não foi possível carregar os dados: ${erro.message}`;

          definirMensagem(mensagemErro, true);
          console.error("Falha ao carregar dados:", erro);
        }
      }

      carregarDados();
    </script>
  </body>
</html>
